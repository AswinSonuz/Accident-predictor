<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Premium">
    <meta name="theme-color" content="#667eea">
    <title>Profile</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="brand">Black spot detector</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="profile.html" class="nav-link active">Profile</a>
                <a href="#" onclick="logout()" class="nav-link">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <div class="profile-container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <h2 class="profile-name" id="displayName">User Profile</h2>
            <p class="profile-email" id="displayEmail">email@example.com</p>
        </div>

        <!-- Profile Edit Form -->
        <div class="profile-form">
            <h2>Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required placeholder="Enter first name">
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Enter last name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter email">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Enter your address">
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="Enter city">
                </div>

                <div class="form-group">
                    <label for="zipCode">Zip/Postal Code</label>
                    <input type="text" id="zipCode" name="zipCode" placeholder="Enter zip code">
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="form-group">
                    <label for="licenseNumber">Driver's License Number (Optional)</label>
                    <input type="text" id="licenseNumber" name="licenseNumber" placeholder="Enter license number">
                </div>

                <div class="form-group">
                    <label for="vehicleInfo">Vehicle Information (Optional)</label>
                    <input type="text" id="vehicleInfo" name="vehicleInfo" placeholder="e.g., 2023 Honda Civic">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">💾 Save Changes</button>
                    <button type="button" class="btn-cancel" onclick="resetForm()">↺ Reset</button>
                </div>
            </form>
        </div>

        <!-- Settings Section -->
        <div class="profile-form" style="margin-top: 30px;">
            <h2>Preferences & Settings</h2>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="notificationsEnabled" checked>
                    <span style="font-weight: normal; margin-left: 8px;">Enable Risk Notifications</span>
                </label>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="soundEnabled" checked>
                    <span style="font-weight: normal; margin-left: 8px;">Enable Alert Sounds</span>
                </label>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="locationTracking">
                    <span style="font-weight: normal; margin-left: 8px;">Allow Location Tracking (for better predictions)</span>
                </label>
            </div>

            <button type="button" class="btn-save" onclick="savePreferences()" style="width: 100%;">Save Preferences</button>
        </div>

        <!-- Danger Zone -->
        <div class="profile-form" style="margin-top: 30px; border-top: 2px solid #e74c3c; padding-top: 30px;">
            <h2 style="color: #e74c3c;">Danger Zone</h2>
            <p>These actions cannot be undone. Please proceed with caution.</p>
            
            <button type="button" class="btn-save" style="width: 100%; background: #e74c3c; margin-top: 15px;" onclick="changePassword()">Change Password</button>
            
            <button type="button" class="btn-save" style="width: 100%; background: #c0392b; margin-top: 15px;" onclick="deleteAccount()">Delete Account</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Black spot detector. All rights reserved.</p>
    </footer>

    <script src="notifications.js"></script>
    <script src="profile.js"></script>
</body>
</html>
