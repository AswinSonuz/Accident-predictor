<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload ML Model - Black Spot Detector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div style="max-width: 600px; margin: 50px auto; padding: 20px;">
        <h1>Upload ML Model</h1>
        <p>Upload your trained <code>accident_risk_model.joblib</code> file to enable real ML predictions.</p>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="modelFile" name="model" accept=".joblib" required>
            <button type="submit">Upload Model</button>
        </form>
        <div id="message"></div>
    </div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('model', document.getElementById('modelFile').files[0]);
            
            const response = await fetch('/upload-model', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            document.getElementById('message').textContent = result.success || result.error;
        });
    </script>
</body>
</html>
