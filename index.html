<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Premium">
    <meta name="theme-color" content="#667eea">
    <title> Home</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemoKeyPlaceYours123456789"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="brand">Premium</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="#" onclick="logout()" class="nav-link">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <main class="main-content">
        <!-- Google Map Section -->
        <section class="map-section">
            <div class="section-header">
                <h2>Live Location Map</h2>
                <button class="btn-primary" onclick="getCurrentLocation()">📍 Use Current Location</button>
            </div>
            <div id="map" class="google-map"></div>
            <div class="location-info">
                <p><strong>Latitude:</strong> <span id="latitude">--</span></p>
                <p><strong>Longitude:</strong> <span id="longitude">--</span></p>
            </div>
        </section>

        <!-- Accident Prediction Section -->
        <section class="prediction-section">
            <div class="section-header">
                <h2>🚗 Accident Risk Prediction</h2>
            </div>

            <div class="prediction-input-group">
                <div class="input-field">
                    <label for="weather">Weather Condition</label>
                    <select id="weather" name="weather">
                        <option value="">Select Weather</option>
                        <option value="clear">Clear</option>
                        <option value="rainy">Rainy</option>
                        <option value="foggy">Foggy</option>
                        <option value="snowy">Snowy</option>
                        <option value="cloudy">Cloudy</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="time">Time of Day</label>
                    <select id="time" name="time">
                        <option value="">Select Time</option>
                        <option value="morning">Morning (6 AM - 12 PM)</option>
                        <option value="afternoon">Afternoon (12 PM - 6 PM)</option>
                        <option value="evening">Evening (6 PM - 9 PM)</option>
                        <option value="night">Night (9 PM - 6 AM)</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="roadType">Road Type</label>
                    <select id="roadType" name="roadType">
                        <option value="">Select Road Type</option>
                        <option value="highway">Highway</option>
                        <option value="urban">Urban</option>
                        <option value="rural">Rural</option>
                        <option value="residential">Residential</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="trafficDensity">Traffic Density</label>
                    <select id="trafficDensity" name="trafficDensity">
                        <option value="">Select Density</option>
                        <option value="light">Light</option>
                        <option value="moderate">Moderate</option>
                        <option value="heavy">Heavy</option>
                        <option value="congested">Congested</option>
                    </select>
                </div>

                <div class="input-field">
                    <label for="speed">Average Speed (km/h)</label>
                    <input type="number" id="speed" name="speed" min="0" max="200" placeholder="Enter speed">
                </div>

                <div class="input-field">
                    <label for="visibility">Visibility (meters)</label>
                    <input type="number" id="visibility" name="visibility" min="0" max="5000" placeholder="Enter visibility">
                </div>
            </div>

            <button class="btn-predict" onclick="predictAccidentRisk()">🔍 Predict Risk Level</button>

            <!-- Prediction Result -->
            <div id="predictionResult" class="prediction-result hidden">
                <h3>Prediction Result</h3>
                <div class="risk-meter">
                    <div id="riskGauge" class="risk-gauge"></div>
                </div>
                <div class="risk-details">
                    <p><strong>Risk Level:</strong> <span id="riskLevel" class="risk-level-text">--</span></p>
                    <p><strong>Probability:</strong> <span id="riskProbability">--%</span></p>
                    <p id="riskMessage" class="risk-message"></p>
                </div>
            </div>
        </section>

        <!-- Statistics Section -->
        <section class="stats-section">
            <h2>Safety Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalPredictions">0</div>
                    <div class="stat-label">Predictions Made</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="highRiskCount">0</div>
                    <div class="stat-label">High Risk Alerts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="averageRisk">0%</div>
                    <div class="stat-label">Average Risk</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Premium Safety Systems. All rights reserved.</p>
    </footer>

    <script src="notifications.js"></script>
    <script src="home.js"></script>
</body>
</html>
